name: shop_flow
description: ShopFlow — production-grade Flutter e-commerce showcase (Clean Architecture, BLoC, Hive, Stripe).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Offline / local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0

  # Payment (initialized at startup when key present)
  flutter_stripe: ^11.3.0

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Logging
  talker: ^4.9.3
  talker_flutter: ^4.9.3
  talker_bloc_logger: ^4.9.3
  talker_dio_logger: ^4.9.3

  # i18n / formatting
  intl: any

  # UI & animations
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  animations: ^2.0.11

  # FP
  dartz: ^0.10.1

  # Env
  flutter_dotenv: ^5.2.1

  # Profile / device
  image_picker: ^1.1.2
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  very_good_analysis: ^7.0.0
  coverage: ^1.15.0

  build_runner: ^2.4.13
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/l10n/
    - assets/env/
    - assets/lottie/
