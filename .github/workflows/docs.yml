name: docs

# Enforce docs hygiene on PRs that touch markdown, AI ignores, skills, or version.

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.*ignore'
      - 'scripts/ai_ignore_template.txt'
      - 'scripts/sync_ai_ignores.*'
      - 'scripts/check_docs_freshness.*'
      - 'scripts/check_skills_drift.*'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - '.agents/skills/**'
      - 'skills-lock.json'
      - 'pubspec.yaml'
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.md'
      - '.*ignore'
      - 'scripts/ai_ignore_template.txt'
      - 'scripts/sync_ai_ignores.*'
      - 'scripts/check_docs_freshness.*'
      - 'scripts/check_skills_drift.*'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - '.agents/skills/**'
      - 'skills-lock.json'
      - 'pubspec.yaml'

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run markdownlint-cli2
        run: npx -y markdownlint-cli2 "**/*.md"

  freshness:
    name: docs freshness (version + ignores + skills)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify pubspec version in README / CHANGELOG / CURRENT_STATUS
        run: bash scripts/check_docs_freshness.sh

      - name: Verify AI ignore files match template
        run: bash scripts/sync_ai_ignores.sh --check

      - name: Verify official skills match skills-lock.json
        run: bash scripts/check_skills_drift.sh
